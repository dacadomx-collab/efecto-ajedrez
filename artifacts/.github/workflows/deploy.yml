# =============================================================================
# Deploy CI/CD — AXON_DCD v1.0.0
# Proyecto : axon_dcd  |  Entorno: produccion
# Generado : 2026-06-11 07:51:28 — FoundationExecutor v1.0 — AXON_GENESIS
# Pipeline : checkout → node-setup → npm ci → build → verify → FTP deploy
# FTP Action: SamKirkland/FTP-Deploy-Action@v4
# =============================================================================

name: "Deploy AXON_DCD — DCD LABS"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Forzar deploy aunque no haya cambios en el diff"
        type: boolean
        default: false
        required: false

concurrency:
  group: "deploy-axon_dcd"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: "Build Next.js + Deploy FTP"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout del repositorio ──────────────────────────────────────
      - name: "⬇ Checkout código fuente"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Configurar Node.js 20 LTS con cache de dependencias ───────────
      - name: "⚙ Setup Node.js 20 LTS"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "z/package-lock.json"

      # ── 3. Instalar dependencias de forma reproducible ────────────────────
      - name: "📦 Instalar dependencias (npm ci)"
        working-directory: ./z
        run: npm ci --prefer-offline

      # ── 4. Build de Next.js con export estático ──────────────────────────
      - name: "🏗 Build Next.js — export estático"
        working-directory: ./z
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NODE_ENV: production

      # ── 5. Verificar que /out existe y contiene archivos ──────────────────
      - name: "✅ Verificar carpeta z/out"
        run: |
          if [ ! -d "./z/out" ]; then
echo "❌ ERROR: La carpeta z/out no fue generada."
echo "Verifica que next.config.js tenga output: 'export'."
exit 1
          fi
          FILE_COUNT=$(find ./z/out -type f | wc -l)
          echo "✅ z/out verificada: ${FILE_COUNT} archivo(s) generado(s)."

      # ── 6. Deploy PHP + assets via FTP ───────────────────────────────────
      - name: "🚀 Deploy via FTP — SamKirkland/FTP-Deploy-Action@v4"
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server:       ${{ secrets.FTP_HOST }}
          username:     ${{ secrets.FTP_USERNAME }}
          password:     ${{ secrets.FTP_PASSWORD }}
          server-dir:   ${{ secrets.FTP_SERVER_DIR }}
          local-dir:    ./
          exclude: |
**/.git*
**/.git*/**
**/.github/**
**/node_modules/**
**/z/.next/**
**/.env
**/.env.*
**/knowledge/**
**/logs/**
**/backups/**
**/*.log
**/*.sql
**/AXON_WORKSPACE/**
**/.claude/**
**/phase1_security/**
**/vendor/**

      # ── 7. Notificación de deploy exitoso ────────────────────────────────
      - name: "📣 Deploy completado"
        if: success()
        run: |
          echo "✅ Deploy exitoso — AXON_DCD v1.0.0"
          echo "🌍 Destino  : /public_html/"
          echo "🔀 Commit   : ${{ github.sha }}"
          echo "👤 Actor    : ${{ github.actor }}"
          echo "⏱ Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"