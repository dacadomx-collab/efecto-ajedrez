# =============================================================================
# Deploy CI/CD — El Efecto Ajedrez: Mentores al Revés
# Repositorio : https://github.com/dacadomx-collab/efecto-ajedrez.git
# Destino     : /home/tourfindycom/public_html/ajedrez (Document Root: /public_html/ajedrez)
# Pipeline    : checkout → FTP deploy (sitio estático PHP, sin build step)
# FTP Action  : SamKirkland/FTP-Deploy-Action@v4.3.5
# =============================================================================

name: "Deploy El Efecto Ajedrez"

on:
  push:
    branches:
      - main

concurrency:
  group: "deploy-efecto-ajedrez"
  cancel-in-progress: true

jobs:
  deploy:
    name: "Deploy FTP a producción"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout código fuente"
        uses: actions/checkout@v4

      - name: "Deploy via FTP"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # La cuenta FTP de cPanel ya está enjaulada en
          # /home/tourfindycom/public_html/ajedrez (su propio "home"). Usar
          # "/public_html/ajedrez/" aquí duplicaba la ruta en el servidor
          # (/public_html/ajedrez/public_html/ajedrez/...). El root FTP YA es
          # el Document Root — server-dir debe ser la raíz relativa "./".
          server-dir: ./
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/knowledge/**
            **/database/**
            **/artifacts/**
            **/logs/**
            **/backups/**
            **/assets/img/historia/**
            **/.env
            **/.env.*
            **/*.sql
            **/*.log
            **/*.md
            **/node_modules/**
            **/.claude/**
